name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint prompt sources
        run: python scripts/lint_prompts.py

      - name: Check harness docs
        run: python scripts/check_harness_docs.py

      - name: Scan prompt sources for malicious instructions
        run: python scripts/scan_prompt_sources.py

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint GitHub workflows
        run: |
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "$actionlint_bin"

      - name: Run tests
        run: python -m pytest -q

      - name: Syntax-check shell scripts
        run: bash -n scripts/sync-ai-prompts scripts/autoimprove-prompts

      - name: Syntax-check Python scripts
        run: python -m py_compile scripts/render_prompts.py scripts/lint_prompts.py scripts/scan_prompt_sources.py scripts/check_harness_docs.py

      - name: Check render output shape
        run: scripts/sync-ai-prompts --check

      - name: Dry-run deploy rendering
        run: scripts/sync-ai-prompts --dry-run
