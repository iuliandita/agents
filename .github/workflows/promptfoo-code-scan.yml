name: Promptfoo Code Scan

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.prompt"
      - "**/*.prompt.yml"
      - "**/*.prompt.yaml"
      - ".github/promptfoo-scan-guidance.md"
      - "prompts/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: promptfoo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promptfoo:
    name: LLM security scan
    runs-on: ubuntu-24.04
    env:
      PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
    steps:
      - name: Skip when Promptfoo is not configured
        if: env.PROMPTFOO_API_KEY == ''
        run: echo "PROMPTFOO_API_KEY is not configured; skipping Promptfoo code scan."

      - name: Check out repository
        if: env.PROMPTFOO_API_KEY != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Promptfoo code scan
        if: env.PROMPTFOO_API_KEY != ''
        uses: promptfoo/code-scan-action@148e01f35bc65bd992b9f44679577aa9123be6ab # v0.1.8
        env:
          PROMPTFOO_API_KEY: ${{ env.PROMPTFOO_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          min-severity: medium
          guidance-file: .github/promptfoo-scan-guidance.md
