name: Promptfoo Code Scan

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.prompt"
      - "**/*.prompt.yml"
      - "**/*.prompt.yaml"
      - ".github/promptfoo-scan-guidance.md"
      - "prompts/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: promptfoo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promptfoo:
    name: LLM security scan
    runs-on: ubuntu-24.04
    env:
      PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
    steps:
      - name: Skip when Promptfoo is not configured
        if: env.PROMPTFOO_API_KEY == ''
        run: echo "PROMPTFOO_API_KEY is not configured; skipping Promptfoo code scan."

      - name: Check out repository
        if: env.PROMPTFOO_API_KEY != ''
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Promptfoo code scan
        if: env.PROMPTFOO_API_KEY != ''
        uses: promptfoo/code-scan-action@0889810b81273b2bec3a37a2a9f914983f8e09e9 # v0.1.4
        env:
          PROMPTFOO_API_KEY: ${{ env.PROMPTFOO_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          min-severity: medium
          guidance-file: .github/promptfoo-scan-guidance.md
